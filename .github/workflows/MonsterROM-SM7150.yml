name: Build MonsterROM-SM7150

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        build_type: [decrypted]
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          repository: mehedihjoy0/MonsterROM-SM7150
          ref: sixteenQPR2
          submodules: 'recursive'

      - name: Integrating SSH Keys f. SF
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SF_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts
      - name: Free disk space (1/3)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/3)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Free disk space (3/3)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'

      - name: Set up build environment
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            7zip attr ccache clang ffmpeg \
            libbrotli-dev libgtest-dev libprotobuf-dev libunwind-dev libpcre2-dev \
            libzstd-dev linux-modules-extra-$(uname -r) lld protobuf-compiler webp
          sudo modprobe erofs f2fs
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo -n "${{ secrets.PLATFORM_KEY_PK8 }}" | base64 --decode > security/unica_platform.pk8
          echo -n "${{ secrets.PLATFORM_KEY_PEM }}" | base64 --decode > security/unica_platform.x509.pem

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Ignore erroring out
        run: |
          source ./buildenv.sh m51
          find "$SRC_DIR/unica" "$SRC_DIR/scripts" -type f -name "*.sh" -exec sed -i "s/exit 1/LOGE \"failed\"/g" {} +
          find "$SRC_DIR/scripts" -type f -name "*.sh" -exec sed -i "s/return 1/return 0/g" {} + 
      
      - name: Build dependencies
        run: |
          source ./buildenv.sh m51
          ./scripts/build_dependencies.sh

      - name: Download stock firmwares
        run: |
          source ./buildenv.sh m51
          ./scripts/download_fw.sh

      - name: Extract stock firmwares
        run: |
          source ./buildenv.sh m51
          ./scripts/extract_fw.sh

      - name: Configure encryption state
        if: matrix.build_type == 'encrypted'
        run: |
          source ./buildenv.sh m51
          touch target/m51/patches/dfe/disable
          sed -i 's|decrypted|encrypted|g' scripts/build_flashable_zip.sh

      - name: Build ROM
        run: |
          source ./buildenv.sh m51
          ./scripts/make_rom.sh --build-rom-zip

      - name: Uploading  Build to SourceForge
        env:
          SF_M51_DIR: ${{ secrets.SF_M51_DIR }}
          
        run: |
          for ROM in out/UN1CA*.zip; do
            echo "Uploading $ROM to SourceForge..."
            scp -i ~/.ssh/id_rsa $ROM $SF_M51_DIR/$ROM           
          done
