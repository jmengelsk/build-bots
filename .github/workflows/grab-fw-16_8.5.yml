name: grab fw85

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        build_type: [decrypted]
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          repository: mehedihjoy0/UN1CA-SM7150
          ref: sixteen-8.5
          submodules: 'recursive'

      - name: Integrating SSH Keys f. SF
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SF_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts
      - name: Free disk space (1/3)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/3)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Free disk space (3/3)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'

      - name: Set up build environment
        run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            7zip attr ccache clang ffmpeg \
            libbrotli-dev libgtest-dev libprotobuf-dev libunwind-dev libpcre2-dev \
            libzstd-dev linux-modules-extra-$(uname -r) lld protobuf-compiler webp
          sudo modprobe erofs f2fs
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo -n "${{ secrets.PLATFORM_KEY_PK8 }}" | base64 --decode > security/unica_platform.pk8
          echo -n "${{ secrets.PLATFORM_KEY_PEM }}" | base64 --decode > security/unica_platform.x509.pem

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build dependencies
        run: |
          source ./buildenv.sh m51
          ./scripts/build_dependencies.sh

      - name: Download firmwares
        run: |
          source ./buildenv.sh m51
          ./scripts/download_fw.sh

      - name: Create odin Tarballs
        run: |
          tar -cvzf ./out/odin_SM-S921U_XAA.tar.gz ./out/odin/SM-S921U_XAA/
          tar -cvzf ./out/odin_SM-S711U1_AIO.tar.gz ./out/odin/SM-S711U1_AIO/
          tar -cvzf ./out/odin_SM-A525_EUX.gz ./out/odin/SM-A525_EUX/

      - name: Extract firmwares
        run: |
          source ./buildenv.sh m51
          ./scripts/extract_fw.sh


      - name: Create fw Tarballs
        run: |
          tar -cvzf ./out/fw_SM-S921U_XAA.tar.gz ./out/fw/SM-S921U_XAA/
          tar -cvzf ./out/fw_SM-S711U1_AIO.tar.gz ./out/fw/SM-S711U1_AIO/
          tar -cvzf ./out/fw_SM-A525_EUX.gz ./out/fw/SM-A525_EUX/
          

      - name: Uploading  Tarballs to SourceForge
        env:
          SF_LAB_DIR: ${{ secrets.SF_LAB_DIR }}
          
        run: |
          for BALL in out/*.gz; do
            echo "Uploading $BALL to SourceForge..."
            scp -i ~/.ssh/id_rsa $BALL $SF_LAB_DIR/           
          done
